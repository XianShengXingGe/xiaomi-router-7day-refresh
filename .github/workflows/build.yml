name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -trimpath -ldflags "-s -w" \
            -o dist/xiaomi-router-autosign-linux-arm64 \
            ./cmd/xiaomi-router-autosign
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags "-s -w" \
            -o dist/xiaomi-router-autosign-linux-amd64 \
            ./cmd/xiaomi-router-autosign

      - name: Package helper scripts
        run: |
          cp scripts/install.sh dist/install.sh
          cp scripts/start.sh dist/start.sh
          cp scripts/status.sh dist/status.sh
          cp scripts/cleanup.sh dist/cleanup.sh

      - name: Checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: xiaomi-router-autosign
          path: dist/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
